    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Specific Styles for the AI Advisor Module */
        .advisor-hero {
            background: linear-gradient(rgba(46, 125, 50, 0.9), rgba(27, 94, 32, 0.9)), url('cp.png');
            background-size: cover;
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        .advisor-section {
            max-width: 900px;
            margin: -50px auto 50px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative;
            z-index: 10;
        }

        .selection-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 600px) {
            .selection-container { grid-template-columns: 1fr; }
        }

        .advisor-label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        select {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: 0.3s;
        }

        select:focus { border-color: #2e7d32; outline: none; }

        .btn-analyze {
            width: 100%;
            background: #2e7d32;
            color: white;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-analyze:hover { background: #1b5e20; }

        .result-display {
            margin-top: 30px;
            padding: 30px;
            background: #f1f8e9;
            border-left: 8px solid #2e7d32;
            border-radius: 8px;
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-link {
            display: inline-block;
            margin-top: 20px;
            background: #c62828;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .product-link:hover {
            background: #a31f1f;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

                    <i class="fas fa-shopping-cart"></i> Cart (<span id="cart-count">0</span>)
                </a></button></li>
                <li><button><a href="farmer_login.html">Farmer Registration</a></button></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="advisor-hero">
            <h1><i class="fas fa-robot"></i> AI Agronomical Advisor</h1>
            <p>Empowering Zimbabwean Farmers with Data-Driven Solutions</p>
        </div>

        <section class="advisor-section">
            <div class="selection-container">
                <div>
                    <label class="advisor-label">1. Select Your Crop</label>
                    <select id="cropType" onchange="loadSymptoms()">
                        <option value="">-- Select Crop --</option>
                        <option value="Maize">Maize</option>
                        <option value="Tobacco">Tobacco</option>
                        <option value="Cotton">Cotton</option>
                        <option value="Wheat">Wheat</option>
                        <option value="Soya Beans">Soya Beans</option>
                    </select>
                </div>
                <div>
                    <label class="advisor-label">2. Describe the Symptom</label>
                    <select id="symptomType">
                        <option value="">-- Select Crop First --</option>
                    </select>
                </div>
            </div>

            <button class="btn-analyze" onclick="processAI()">Generate AI Diagnosis</button>

            <div id="aiOutput" class="result-display">
                <h2 id="outTitle" style="color: #2e7d32;"></h2>
                <hr>
                <p><strong>Expert Advice:</strong> <span id="outAdvice"></span></p>
                <p><strong>Recommended Solution:</strong> <span id="outProduct"></span></p>
                <a href="products.html" class="product-link"><i class="fas fa-shopping-cart"></i> Order Product Now</a>
            </div>
        </section>
    </main>

    <script>
        const aiKnowledgeBase = {
            "Maize": {
                "Yellowing from bottom leaves": ["Nitrogen Deficiency", "Your crop needs immediate Top Dressing. Apply CP Urea (46% N) at the recommended rate per hectare.", "CP Urea Fertilizer"],
                "Holes in the funnel/leaves": ["Fall Armyworm Attack", "Severe infestation detected. Spray CP-Lufenuron or Emamectin Benzoate during late evening for best results.", "Armyworm Destroyer"],
                "Stunted growth with purple leaves": ["Phosphorus Deficiency", "The roots are not developing properly. Use CP Compound D or high-phosphate starter fertilizer.", "CP Compound D"],
                "White streaks on leaves": ["Zinc Deficiency", "Common in sandy soils. Apply CP-Zinc micronutrient foliar spray.", "Zinc Sulfate Spray"]
            },
            "Tobacco": {
                "Wilting during the day": ["Bacterial Wilt", "Ensure proper field hygiene and drainage. Apply CP Soil Sterilizer to affected patches.", "Soil Sterilizer"],
                "Target-like spots on lower leaves": ["Frog Eye (Fungal)", "Favorable conditions for fungi. Apply CP-Copper Oxychloride or appropriate fungicide.", "Copper Oxychloride"]
            },
            "Cotton": {
                "Sticky leaves and leaf curling": ["Aphid Attack", "Aphids are sucking sap. Spray CP-Acetamiprid systemic insecticide to protect new growth.", "Aphid Insecticide"],
                "Reddish patches on leaves": ["Red Spider Mites", "Apply CP-Abamectin Miticide. Ensure thorough coverage under the leaves.", "CP Miticide"]
            },
            "Wheat": {
                "Orange powdery pustules": ["Wheat Leaf Rust", "Fungal spores are spreading. Use CP-Tebuconazole foliar fungicide immediately.", "Wheat Fungicide"]
            },
            "Soya Beans": {
                "Yellowing between leaf veins": ["Magnesium Deficiency", "Soil pH may be affecting nutrient uptake. Apply CP-Magnesium Sulfate.", "Epsom Salts"]
            }
        };

        function loadSymptoms() {
            const crop = document.getElementById('cropType').value;
            const sBox = document.getElementById('symptomType');
            sBox.innerHTML = '<option value="">-- Select Symptom --</option>';

            if (crop && aiKnowledgeBase[crop]) {
                for (let s in aiKnowledgeBase[crop]) {
                    let opt = document.createElement('option');
                    opt.value = s;
                    opt.innerHTML = s;
                    sBox.appendChild(opt);
                }
            }
        }

        function processAI() {
            const crop = document.getElementById('cropType').value;
            const symptom = document.getElementById('symptomType').value;
            const output = document.getElementById('aiOutput');

            if (!crop || !symptom) {
                alert("Please complete both selections for an accurate AI diagnosis.");
                return;
            }

            const result = aiKnowledgeBase[crop][symptom];
            document.getElementById('outTitle').innerHTML = "<i class='fas fa-check-circle'></i> Diagnosis: " + result[0];
            document.getElementById('outAdvice').innerText = result[1];
            document.getElementById('outProduct').innerText = result[2];

            output.style.display = "block";
            window.scrollTo({ top: output.offsetTop + 100, behavior: 'smooth' });
        }
    </script>
