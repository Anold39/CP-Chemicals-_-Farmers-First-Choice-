<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .error-container {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .error-icon {
            font-size: 80px;
            color: var(--cp-green);

        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: var(--cp-blue);
            line-height: 1;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <img src="images/logo.png" alt="CP Chemicals" class="Anniversary">
        </nav>
    </header>

    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-seedling"></i>
        </div>
        <div class="error-code">404</div>
        <h2>Oops! This field seems empty.</h2>
        <p>The page you are looking for might have been moved, deleted, or never planted.</p>
        <br>
        <a href="index.html" class="btn-shop" style="text-decoration: none;">
